<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jugs Sandbox — multi-instance test</title>
  <link rel="stylesheet" href="jugs-sandbox.css">
  <style>
    body { font-family: sans-serif; margin: 24px; max-width: 1200px; }
    h1 { font-size: 1.2rem; }
    .hint { color: #555; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
    .gap { height: 40px; }
  </style>
</head>
<body>

  <h1>Jugs Sandbox — multi-instance test (segment 5.3 Activity 5)</h1>
  <p class="hint">
    Two independent widgets on one page. Each must keep its own variant,
    state, visited set, history, and "highlight reachable" toggle. Pressing
    Reset, Undo, or an action button on one widget must not affect the
    other.
  </p>

  <!-- Widget 1: Die Hard (3, 5) -->
  <div class="jugs-widget" data-problem='{
    "title": "Widget 1 — Die Hard (3, 5)",
    "defaultPreset": "die-hard"
  }'></div>

  <div class="gap"></div>

  <!-- Widget 2: Coprime (4, 9) — used in the activity task (d) teaser -->
  <div class="jugs-widget" data-problem='{
    "title": "Widget 2 — coprime (4, 9)",
    "defaultPreset": "coprime"
  }'></div>

  <script src="jugs-sandbox.js"></script>

</body>
</html>
