<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantified Logic Equivalence — multi-instance test</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: sans-serif; margin: 24px; max-width: 1100px; }
    h1 { font-size: 1.2rem; }
    .hint { color: #555; font-size: 0.9rem; margin-bottom: 24px; }
    .gap { height: 32px; }
  </style>
</head>
<body>

  <h1>Quantificational Logic Equivalence — multi-instance test</h1>
  <p class="hint">
    Three independent widgets on one page. Selection, undo, rules-toggle, and
    the α-rename input must all act per-widget without affecting siblings.
  </p>

  <div class="logic-equiv-quantified-widget"
       data-problem='{"start": "¬∀x.P(x)", "target": "∃x.¬P(x)"}'></div>

  <div class="gap"></div>

  <div class="logic-equiv-quantified-widget"
       data-problem='{"start": "(∀x.P(x)) ∧ Q", "target": "∀x.(P(x) ∧ Q)"}'></div>

  <div class="gap"></div>

  <div class="logic-equiv-quantified-widget"
       data-problem='{"start": "¬∀x. Glitters(x) → Gold(x)", "target": "∃x. Glitters(x) ∧ ¬Gold(x)"}'></div>

  <script src="script.js"></script>

</body>
</html>
