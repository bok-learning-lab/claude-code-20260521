<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logic Equivalence Practice — multi-instance test</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { font-family: sans-serif; margin: 24px; max-width: 1100px; }
    h1 { font-size: 1.2rem; }
    .hint { color: #555; font-size: 0.9rem; margin-bottom: 24px; }
    .gap { height: 32px; }
  </style>
</head>
<body>

  <h1>Logic Equivalence Practice — multi-instance test</h1>
  <p class="hint">
    Three independent widgets on one page. Selecting a subexpression in one
    must not affect selection in the others. Undo and Hide-laws toggles must
    operate per-widget.
  </p>

  <div class="logic-equiv-widget"
       data-problem='{"start": "¬(P ∧ Q)", "target": "¬P ∨ ¬Q"}'></div>

  <div class="gap"></div>

  <div class="logic-equiv-widget"
       data-problem='{"start": "P → Q", "target": "¬P ∨ Q"}'></div>

  <div class="gap"></div>

  <div class="logic-equiv-widget"
       data-problem='{"start": "(P ∧ Q) ∨ (P ∧ R)", "target": "P ∧ (Q ∨ R)"}'></div>

  <script src="script.js"></script>

</body>
</html>
