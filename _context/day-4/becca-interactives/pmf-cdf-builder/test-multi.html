<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMF / CDF Builder (W32) — multi-instance test</title>
  <link rel="stylesheet" href="pmf-cdf-builder.css">
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 24px; max-width: 1100px; }
    h1 { font-size: 1.2rem; }
    .hint { color: #555; font-size: 0.9rem; margin-bottom: 24px; }
    .gap { height: 32px; }
  </style>
</head>
<body>

  <h1>PMF / CDF Builder (W32) — multi-instance test</h1>
  <p class="hint">
    Four independent widgets on one page. Open the browser console:
    self-tests should run exactly once. Editing one widget's table or
    selecting a bar must not affect the others.
  </p>

  <!-- Widget 1: blank, default -->
  <div class="pmf-widget" data-problem='{
    "title": "Widget 1 — Blank",
    "intro": "<p>Type your own (value, probability) pairs.</p>",
    "defaultPreset": "blank"
  }'></div>

  <div class="gap"></div>

  <!-- Widget 2: two-dice sum preloaded -->
  <div class="pmf-widget" data-problem='{
    "title": "Widget 2 — Two-dice sum (running example from 9.0 Activity 2)",
    "intro": "<p>Verify Σp = 1 and E[X] = 7. Click any bar or step to highlight the corresponding row.</p>",
    "defaultPreset": "twoDice"
  }'></div>

  <div class="gap"></div>

  <!-- Widget 3: Binomial(10, 1/2) preloaded -->
  <div class="pmf-widget" data-problem='{
    "title": "Widget 3 — Binomial(10, 1/2) (Activity 8 / 9b)",
    "intro": "<p>Verify Σp = 1 and E[X] = 5 (= np for the binomial). Notice the symmetric, bell-shape envelope.</p>",
    "defaultPreset": "binomial10"
  }'></div>

  <div class="gap"></div>

  <!-- Widget 4: sailor random walk at t=4 preloaded -->
  <div class="pmf-widget" data-problem='{
    "title": "Widget 4 — Sailor walk at t = 4 (Activity 11)",
    "intro": "<p>Symmetric random walk after 4 steps. Values in {-4, -2, 0, 2, 4}; counts 1, 4, 6, 4, 1 over 16 = 2^4 paths. Verify E[X] = 0.</p>",
    "defaultPreset": "sailor4"
  }'></div>

  <script src="pmf-cdf-builder.js"></script>

</body>
</html>
