<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower of Hanoi — multi-instance test</title>
  <link rel="stylesheet" href="tower-of-hanoi.css">
  <style>
    body { font-family: sans-serif; margin: 24px; max-width: 1200px; }
    h1 { font-size: 1.2rem; }
    .hint { color: #555; font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
    .gap { height: 40px; }
  </style>
</head>
<body>

  <h1>Tower of Hanoi — multi-instance test (segment 6.1 Activity 3b)</h1>
  <p class="hint">
    Two independent widgets on one page. Each must keep its own disk count,
    pegs state, move counter, and selection. Picking up a disk in one
    widget must not affect the other; pressing Reset on one must scope
    per-widget.
  </p>

  <!-- Widget 1: default (4 disks) -->
  <div class="hanoi-widget" data-problem='{
    "title": "Widget 1 — 4 disks (default)",
    "defaultN": 4
  }'></div>

  <div class="gap"></div>

  <!-- Widget 2: 3 disks for a quick test (optimal: 7 moves) -->
  <div class="hanoi-widget" data-problem='{
    "title": "Widget 2 — 3 disks (warm-up)",
    "defaultN": 3,
    "minN": 3,
    "maxN": 5
  }'></div>

  <script src="tower-of-hanoi.js"></script>

</body>
</html>
