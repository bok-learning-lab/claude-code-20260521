<!--
  Venn Diagram Set Operations Explorer — embeddable widget.

  Embed shape: a single self-contained <div class="ven-widget"> per problem.
  Edit the JSON inside the data-problem attribute to author a new problem.
  Multiple <div class="ven-widget"> blocks can coexist on the same page.

  data-problem JSON keys (all optional):
    title          (string) — bold heading shown above the diagram.
    intro          (HTML string) — short intro text card above the diagram.
    modes          (Array<"two"|"three">) — which modes appear in the toggle.
                   Default: ["two", "three"]. If only one mode is listed,
                   the toggle is hidden.
    defaultMode    ("two"|"three") — initial mode. Default: first in modes.
    expressionsTwoSet
                   (Array<Expression>) — list shown in two-set mode.
                   Defaults to a built-in list including De Morgan pairs.
    expressionsThreeSet
                   (Array<Expression>) — list shown in three-set mode.

  Each Expression has:
    expr          (string, required) — display text, e.g. "A ∪ B".
                  Use "\\" for the set-difference symbol "\". (In JSON
                  string escaping, that means writing "\\\\" in the
                  data-problem source so the resulting string contains
                  a single backslash.)
    regions       (Array<string>, required) — region keys highlighted.
                  Two-set keys:   A_only, B_only, AB, complement
                  Three-set keys: A_only, B_only, C_only, AB, AC, BC,
                                  ABC, complement
    description   (string, optional) — shown when the expression is
                  selected, e.g. "x ∈ A and x ∉ B".

  The widget does NOT parse expressions. Authors specify which regions
  each expression highlights. Two expressions that highlight the same
  region set (e.g. "(A ∪ B)̄" and "Ā ∩ B̄") will be cross-referenced in
  the De Morgan note panel.
-->
<div class="ven-widget" data-problem='{
  "title": "Venn Diagram: Set Operations Explorer",
  "intro": "<p>Click a set expression on the right to see which region(s) of the Venn diagram it picks out. Try clicking <em>(A ∪ B)̄</em> and then <em>Ā ∩ B̄</em> &mdash; both highlight the same region. That is De Morgan&rsquo;s law in pictures.</p><p>Use the toggle to switch between two-set and three-set diagrams.</p>",
  "modes": ["two", "three"],
  "defaultMode": "two",
  "expressionsTwoSet": [
    { "expr": "A",         "regions": ["A_only", "AB"],           "description": "x ∈ A" },
    { "expr": "B",         "regions": ["B_only", "AB"],           "description": "x ∈ B" },
    { "expr": "A ∪ B",     "regions": ["A_only", "B_only", "AB"], "description": "x ∈ A or x ∈ B" },
    { "expr": "A ∩ B",     "regions": ["AB"],                      "description": "x ∈ A and x ∈ B" },
    { "expr": "A \\ B",    "regions": ["A_only"],                  "description": "x ∈ A and x ∉ B" },
    { "expr": "B \\ A",    "regions": ["B_only"],                  "description": "x ∈ B and x ∉ A" },
    { "expr": "A ∩ B̄",     "regions": ["A_only"],                  "description": "x ∈ A and x ∉ B  (same as A \\ B)" },
    { "expr": "Ā",         "regions": ["B_only", "complement"],    "description": "x ∉ A" },
    { "expr": "(A ∪ B)̄",   "regions": ["complement"],              "description": "x ∉ A and x ∉ B" },
    { "expr": "Ā ∩ B̄",     "regions": ["complement"],              "description": "x ∉ A and x ∉ B  (De Morgan)" }
  ],
  "expressionsThreeSet": [
    { "expr": "A ∪ B ∪ C",      "regions": ["A_only","B_only","C_only","AB","AC","BC","ABC"], "description": "x ∈ A or x ∈ B or x ∈ C" },
    { "expr": "A ∩ B ∩ C",      "regions": ["ABC"],                                            "description": "x ∈ A and x ∈ B and x ∈ C" },
    { "expr": "A ∩ B",          "regions": ["AB","ABC"],                                       "description": "x ∈ A and x ∈ B" },
    { "expr": "(A ∩ B) \\ C",   "regions": ["AB"],                                             "description": "x ∈ A and x ∈ B and x ∉ C" },
    { "expr": "A \\ (B ∪ C)",   "regions": ["A_only"],                                         "description": "x ∈ A and x ∉ B and x ∉ C" },
    { "expr": "(A ∪ B) ∩ C",    "regions": ["AC","BC","ABC"],                                  "description": "x ∈ C and (x ∈ A or x ∈ B)" },
    { "expr": "(A ∩ B ∩ C)̄",    "regions": ["A_only","B_only","C_only","AB","AC","BC","complement"], "description": "NOT (x ∈ A and x ∈ B and x ∈ C)" }
  ]
}'></div>
